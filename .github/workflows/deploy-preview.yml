name: Deploy Preview

# Vercel's GitHub integration builds and deploys automatically once this
# repo is connected to a Vercel project. This workflow re-validates the
# production build in CI so a broken build never reaches Vercel silently.

on:
  pull_request:
    branches: [main]

jobs:
  build-check:
    name: Verify production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
          NEXT_PUBLIC_LIBRARY_REGISTRY_CONTRACT_ID: "CDUMMYPLACEHOLDERFORBUILD00000000000000000000000000"
          NEXT_PUBLIC_STEWARD_REPUTATION_CONTRACT_ID: "CDUMMYPLACEHOLDERFORBUILD00000000000000000000000000"

      - name: Summary
        run: echo "✅ Production build verified. Vercel will deploy this PR's preview automatically." >> $GITHUB_STEP_SUMMARY
