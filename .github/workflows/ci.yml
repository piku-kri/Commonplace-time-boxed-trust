name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Smart Contracts (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build steward-reputation (wasm)
        working-directory: contracts/steward-reputation
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Build library-registry (wasm)
        working-directory: contracts/library-registry
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run contract test suite
        run: cargo test --workspace --verbose

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit + component tests
        run: npm run test

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
          NEXT_PUBLIC_LIBRARY_REGISTRY_CONTRACT_ID: "CDUMMYPLACEHOLDERFORBUILD00000000000000000000000000"
          NEXT_PUBLIC_STEWARD_REPUTATION_CONTRACT_ID: "CDUMMYPLACEHOLDERFORBUILD00000000000000000000000000"
